              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: more
        label: More projects (внизу)
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - name: name
            label: Назва
            type: string
          - name: category
            label: Категорія
            type: string
          - name: url
            label: Посилання
            type: string
          - name: image
            label: Зображення
            type: image

