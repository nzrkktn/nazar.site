media:
  input: images
  output: /images
  categories: [image]

content:
  - name: site
    label: Загальне — ім'я, email, соцмережі
    type: file
    path: content/site.json
    format: json
    fields:
      - name: name
        label: Ім'я (лого скрізь)
        type: string
        required: true
      - name: email
        label: Email
        type: string
      - name: instagram
        label: Instagram — нік
        type: string
      - name: instagramUrl
        label: Instagram — посилання
        type: string
      - name: copyright
        label: Копірайт унизу сторінок
        type: string
      - name: booking
        label: Зелений бейдж на головній
        type: string

  - name: slides
    label: Слайдер робіт (ліва панель)
    type: file
    path: content/slides.json
    format: json
    list: true
    fields:
      - name: title
        label: Назва проєкту
        type: string
      - name: category
        label: Категорія
        type: string
      - name: image
        label: Зображення
        type: image
      - name: url
        label: Посилання на кейс
        type: string
      - name: logo
        label: Логотип (з'являється при наведенні)
        type: image

  - name: home
    label: Головна
    type: file
    path: content/home.json
    format: json
    fields:
      - name: headline
        label: Заголовок
        type: text
      - name: accentWord
        label: Сіре слово в кінці заголовка
        description: Порожньо — заголовок без сірого слова
        type: string
      - name: cta1
        label: Кнопка 1 (чорна)
        type: string
      - name: cta2
        label: Кнопка 2 (сіра)
        type: string

  - name: about
    label: Про мене
    type: file
    path: content/about.json
    format: json
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: text
        label: Текст
        description: Порожній рядок — новий абзац. Абзаців може бути скільки завгодно.
        type: text
      - name: tags
        label: Теги на фото (до 3)
        type: string
        list:
          max: 3
      - name: photo
        label: Фото
        type: image
      - name: signature
        label: Ім'я внизу фото
        type: string
      - name: cta
        label: Кнопка
        type: string

  - name: projects
    label: Проєкти
    type: file
    path: content/projects.json
    format: json
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: lede
        label: Підзаголовок
        type: text
      - name: list
        label: Список проєктів
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name} ({year})"
        fields:
          - name: name
            label: Назва
            type: string
          - name: category
            label: Категорія
            type: string
          - name: year
            label: Рік
            type: string
          - name: url
            label: Посилання (сторінка кейсу або "#")
            type: string
          - name: isNew
            label: Позначка «New»
            type: boolean

  - name: services
    label: Послуги та прайс
    type: file
    path: content/services.json
    format: json
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: lede
        label: Підзаголовок
        type: text
      - name: tiers
        label: Пакети
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name} — {price}"
        fields:
          - name: flag
            label: Плашка над назвою
            description: Напр. «Most chosen». Порожньо — без плашки.
            type: string
          - name: name
            label: Назва
            type: string
          - name: price
            label: Ціна
            type: string
          - name: forWho
            label: Для кого
            type: text
          - name: features
            label: Пункти пакета
            type: object
            list: true
            fields:
              - name: text
                label: Текст
                type: text
              - name: highlight
                label: Виділити жирним (стратегія)
                type: boolean
          - name: button
            label: Кнопка
            type: string
          - name: hero
            label: Герой-пакет (синя рамка)
            type: boolean
      - name: rules
        label: Правила під прайсом
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Заголовок
            type: string
          - name: text
            label: Текст
            type: text

  - name: contact
    label: Контакт
    type: file
    path: content/contact.json
    format: json
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: lede
        label: Підзаголовок
        type: text
      - name: basedIn
        label: Локація (на панелі)
        type: string
      - name: responseNote
        label: Напис біля кнопки
        type: string
      - name: image
        label: Зображення панелі
        type: image

  - name: case_tavitas
    label: Кейс — Tavita's Touch
    type: file
    path: content/case-tavitas.json
    format: json
    fields:
      - name: title
        label: Назва
        type: string
      - name: intro
        label: Інтро (зліва, під назвою)
        description: Порожній рядок — новий абзац.
        type: text
      - name: meta
        label: Мета-таблиця
        type: object
        fields:
          - name: year
            label: Year
            type: string
          - name: scope
            label: Scope
            type: string
          - name: timeline
            label: Timeline
            type: string
          - name: liveLabel
            label: Текст посилання Live
            type: string
          - name: liveUrl
            label: URL посилання Live
            type: string
      - name: subject
        label: "01 · The Subject — продукт / місце / люди"
        description: "Візуал: найсильніший кадр самого бізнесу, без лого. Текст: одне речення, що вводить у світ бренду і містить гачок (напр. конфлікт на кшталт «hand-thrown + machine precision»)."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: difference
        label: "02 · The Difference — правда про бренд"
        description: "Візуал: деталь, що показує ту саму правду. Текст: що вирізняє цей бренд — не проти інших, а сам по собі. Тут живе дистинктивність."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: anchor
        label: "03 · The Anchor — стратегічний якір"
        description: "Візуал: щось про людину/суть за брендом. Текст: одна ідея, з якої виросло все рішення. Позиціонування у форматі «зайняте вільне місце»."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: identity
        label: "04 · The Identity — розкриття"
        description: "Візуал: повноекранний лок-ап. Перша поява лого. Тиша, повітря. Текст: мінімум або нічого — «The identity.»"
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: mark
        label: "05 · The Mark — знак"
        description: "Візуал: монограма/знак великим. Текст: що це і чому саме так — логіка форми."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: typeColor
        label: "06 · Type & Color — голос"
        description: "Візуал: шрифт + свотчі + застосування. Текст: чому цей голос несе позицію."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: inWorld
        label: "07 · In The World — застосування"
        description: "Візуал: сітка мокапів/носіїв — де бренд живе. Текст: як система тримається на різних носіях."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
            label: Зображення (від 1 до 3)
            type: object
            list:
              min: 1
              max: 3
            fields:
              - name: image
                label: Фото
                type: image
              - name: ratio
                label: Співвідношення сторін
                description: "Напр. 4:5, 1:1, 16:10, 3:4 — будь-яке W:H. Порожньо — 4:5."
                type: string
          - name: text
            label: Текст
            type: text
      - name: result
        label: "Результат (опційно, перед блоком 08)"
        description: "Цитата або цифра з результатом — залиш порожнім, якщо ще нема."
        type: object
        fields:
          - name: text
            label: Текст (цитата/цифра)
            type: text
      - name: system
        label: "08 · The System — закриття активом"
        description: "Візуал: найкрасивіший фінальний кадр. Текст: одне речення, що зводить усе до цінності — бренд як актив, що накопичується."
        type: object
        fields:
          - name: label
            label: Заголовок-підказка
            description: "Маленький підпис над текстом, напр. «THE SUBJECT». Підказує, про що блок."
            type: string
          - name: images
