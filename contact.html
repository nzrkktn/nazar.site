<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Nazar Kokoten</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="split">

  <aside class="panel">
    <div class="panel-inner">
      <div class="slides"><div class="slide slide-2 active"><div class="fill" data-img="contact.image">( image — studio / workspace )</div></div></div>
      <div class="contact-info">
        <div><div class="k">Email</div><div class="v" data-c="site.email">hello@nazarkokoten.com</div></div>
        <div><div class="k">Instagram</div><div class="v" data-c="site.instagram">@nzrkktn</div></div>
        <div><div class="k">Based in</div><div class="v" data-c="contact.basedIn">Rhode Island, US</div></div>
      </div>
    </div>
  </aside>

  <main class="content">
    <nav class="topnav">
      <a class="site-logo" href="index.html">
        <img class="logo-light" src="images/circle-buro-logo-black.png" alt="Circle Buro">
        <img class="logo-dark" src="images/circle-buro-logo-white.png" alt="Circle Buro">
      </a>
      <button class="menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
      <button class="theme-btn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>

    <div style="margin-top:auto;margin-bottom:auto">
      <h1 class="h-big rv" style="margin-bottom:20px" data-c="contact.title">Let's talk</h1>
      <p class="body-lg rv" style="--d:.06s" data-c="contact.lede"></p>

      <div class="form-grid rv" style="--d:.1s">
        <div class="field"><label>Name</label><input type="text" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" placeholder="you@business.com"></div>
        <div class="field"><label>Business</label><input type="text" placeholder="Café, studio, shop…"></div>
        <div class="field"><label>Starting point</label>
          <select data-tier-select></select>
        </div>
        <div class="field full-w"><label>What are you working on?</label><textarea placeholder="Tell me about your business and what you need"></textarea></div>
      </div>

      <div class="form-foot rv" style="--d:.14s">
        <a class="btn solid" href="#">Get in touch</a>
        <span class="resp">◷ <span data-c="contact.responseNote">Avg. response: 24h</span></span>
      </div>
    </div>

    <footer class="site-foot">
      <span data-c="site.copyright">© 2026 Nazar Kokoten</span>
      <div class="links">
        <a href="https://instagram.com/nzrkktn" data-ig target="_blank" rel="noopener">Instagram</a>
        <a href="services.html">Services</a>
      </div>
    </footer>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
