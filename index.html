<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nazar Kokoten — Brand & Identity Design</title>
<meta name="description" content="Brand identity and strategy for cafés, barbershops, studios and small shops.">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="images/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="images/favicon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body>
<div class="split">

  <!-- LEFT: project slider (built from content/*.json) -->
  <aside class="panel">
    <div class="panel-inner">
      <div class="panel-topbar">
        <a class="panel-logo" href="index.html"><img src="images/circle-buro-logo-white.png" alt="Circle Buro"></a>
        <button class="theme-btn panel-theme-btn" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div class="slides" data-slides></div>
      <div class="dots"></div>
      <button class="slider-arrow" aria-label="Next project">→</button>
    </div>
  </aside>

  <!-- RIGHT: content -->
  <main class="content">
    <nav class="topnav">
      <a class="site-logo" href="index.html">
        <img class="logo-light" src="images/circle-buro-logo-black.png" alt="Circle Buro">
        <img class="logo-dark" src="images/circle-buro-logo-white.png" alt="Circle Buro">
      </a>
      <button class="menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul>
        <li><a href="index.html" aria-current="page">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="theme-btn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>

    <section class="hero-block">
      <span class="badge rv" data-c="site.booking">Now booking</span>
      <h1 class="display rv" style="--d:.08s"><span data-c="home.headline">I build brands that make good businesses</span> <span class="muted" data-c="home.accentWord">unignorable</span></h1>
      <div class="btns rv" style="--d:.16s">
        <a class="btn solid" href="contact.html" data-c="home.cta1">Book a call</a>
        <a class="btn soft" href="projects.html" data-c="home.cta2">View projects</a>
      </div>
    </section>

    <footer class="site-foot">
      <span data-c="site.copyright">© 2026 Nazar Kokoten</span>
      <div class="links">
        <a href="https://instagram.com/nzrkktn" data-ig target="_blank" rel="noopener">Instagram</a>
        <a href="contact.html">Contact</a>
      </div>
    </footer>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
